name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Newest push supersedes any older in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # package.json pins yarn@4 via packageManager; Corepack activates it.
      - run: corepack enable
      - uses: actions/configure-pages@v5
      # Yarn 4 uses --immutable (the Yarn 1 --frozen-lockfile flag does not exist here).
      - run: yarn install --immutable
      # tsc --noEmit && vite build; a type/build error fails here so deploy never runs.
      - run: yarn build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
